# HermesClaw -- STRICT policy preset
#
# Maximum security. Hermes can only call the LLM via inference.local.
# No internet, no gateway, no skills download.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /home/sandbox/.hermes
    - /sandbox
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  inference_only:
    binaries:
      - path: /usr/local/bin/hermes*
      - path: /usr/bin/python3*
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: inference.local
        port: 80
