# HermesClaw — STRICT policy preset
#
# Maximum security. Hermes can only:
#   - Call the local LLM via inference.local
#   - Read/write ~/.hermes and /sandbox
#   - No internet, no gateway, no skills download
#
# Use when: running Hermes as a pure local assistant with no external connectivity.
#
# Apply: openshell policy set hermesclaw-1 --policy openshell/policy-strict.yaml --wait

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /root/.hermes
    - /sandbox
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: hermes
  run_as_group: hermes

network_policies:
  inference_only:
    binaries:
      - "/root/.local/bin/hermes*"
      - "/usr/bin/python3*"
    endpoints:
      - host: "inference.local"
        port: 443
        protocol: https
        tls: required
        rest:
          - method: "POST"
            path: "/v1/chat/completions"
            access_level: read-write
          - method: "POST"
            path: "/v1/completions"
            access_level: read-write
          - method: "POST"
            path: "/v1/embeddings"
            access_level: read-write
          - method: "GET"
            path: "/v1/models"
            access_level: read-only
      - host: "inference.local"
        port: 80
        protocol: http
