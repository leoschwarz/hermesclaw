# HermesClaw -- OpenShell Sandbox Policy
#
# Enforced at the kernel level via:
#   Landlock LSM    -- filesystem isolation (static, locked at creation)
#   Seccomp BPF     -- syscall filtering    (static, locked at creation)
#   OPA + HTTP CONNECT proxy -- network egress control (hot-reloadable)
#
# Reference: https://docs.nvidia.com/openshell/latest/reference/policy-schema

version: 1

# -- Filesystem (Landlock LSM -- STATIC, locked at creation) --
filesystem_policy:
  include_workdir: true

  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs

  read_write:
    - /root/.hermes
    - /sandbox
    - /tmp

# -- Landlock compatibility --
landlock:
  compatibility: best_effort

# -- Process isolation (STATIC, locked at creation) --
# Hermes runs as an unprivileged user -- cannot escalate to root.
process:
  run_as_user: sandbox
  run_as_group: sandbox

# -- Network policies (OPA + HTTP CONNECT -- HOT-RELOADABLE) --
network_policies:

  # Inference: allow Hermes to call the LLM via OpenShell's privacy router.
  # OpenShell intercepts calls to inference.local and routes to the configured
  # backend. Credentials are managed by OpenShell, not exposed to the agent.
  inference_local:
    binaries:
      - path: /root/.local/bin/hermes*
      - path: /usr/bin/python3*
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: inference.local
        port: 80

  # Telegram gateway (uncomment to enable)
