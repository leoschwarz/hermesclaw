# HermesClaw — GATEWAY policy preset
#
# Enables messaging gateway (Telegram + Discord + Signal).
# Hermes can:
#   - Call the local LLM via inference.local
#   - Post/receive Telegram messages
#   - Post/receive Discord messages
#   - No web search, no skills download
#
# Use when: running hermes gateway as a Telegram/Discord bot.
#
# Apply: openshell policy set hermesclaw-1 --policy openshell/policy-gateway.yaml --wait

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /root/.hermes
    - /sandbox
    - /tmp

landlock:
  enabled: true

process:
  user: hermes
  group: hermes

network_policies:
  inference_local:
    binaries:
      - "/root/.local/bin/hermes*"
      - "/usr/bin/python3*"
    endpoints:
      - host: "inference.local"
        port: 443
        protocol: https
        tls: required
      - host: "inference.local"
        port: 80
        protocol: http

  telegram_gateway:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "api.telegram.org"
        port: 443
        protocol: https
        tls: required

  discord_gateway:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "discord.com"
        port: 443
        protocol: https
        tls: required
      - host: "gateway.discord.gg"
        port: 443
        protocol: https
        tls: required
