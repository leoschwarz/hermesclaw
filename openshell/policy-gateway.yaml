# HermesClaw -- GATEWAY policy preset
#
# Enables messaging gateway (Telegram + Discord).
# Hermes can:
#   - Call the LLM via inference.local
#   - Post/receive Telegram messages
#   - Post/receive Discord messages
#   - No web search, no skills download
#
# Use when: running hermes gateway as a Telegram/Discord bot.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /home/sandbox/.hermes
    - /sandbox
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  inference_local:
    binaries:
      - path: /usr/local/bin/hermes*
      - path: /usr/bin/python3*
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: inference.local
        port: 80

  telegram_gateway:
    binaries:
      - path: /usr/local/bin/hermes*
    endpoints:
      - host: api.telegram.org
        port: 443
        enforcement: enforce
        access: read-write

  discord_gateway:
    binaries:
      - path: /usr/local/bin/hermes*
    endpoints:
      - host: discord.com
        port: 443
        enforcement: enforce
        access: read-write
      - host: gateway.discord.gg
        port: 443
        enforcement: enforce
        access: read-write
