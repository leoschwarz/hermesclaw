# HermesClaw -- PERMISSIVE policy preset
#
# Full capability: inference + all gateways + web search + skills download.
# Still blocked: arbitrary outbound connections, filesystem escape, privileged syscalls.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /root/.hermes
    - /sandbox
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: hermes
  run_as_group: hermes

network_policies:
  inference_local:
    binaries:
      - path: /root/.local/bin/hermes*
      - path: /usr/bin/python3*
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: inference.local
        port: 80

  telegram_gateway:
    binaries:
      - path: /root/.local/bin/hermes*
    endpoints:
      - host: api.telegram.org
        port: 443
        enforcement: enforce
        access: read-write

  discord_gateway:
    binaries:
      - path: /root/.local/bin/hermes*
    endpoints:
      - host: discord.com
        port: 443
        enforcement: enforce
        access: read-write
      - host: gateway.discord.gg
        port: 443
        enforcement: enforce
        access: read-write

  slack_gateway:
    binaries:
      - path: /root/.local/bin/hermes*
    endpoints:
      - host: slack.com
        port: 443
        enforcement: enforce
        access: read-write
      - host: wss-primary.slack.com
        port: 443
        enforcement: enforce
        access: read-write

  web_search:
    binaries:
      - path: /root/.local/bin/hermes*
    endpoints:
      - host: html.duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: api.duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only

  github_skills:
    binaries:
      - path: /root/.local/bin/hermes*
    endpoints:
      - host: github.com
        port: 443
        enforcement: enforce
        access: read-only
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
