# HermesClaw — PERMISSIVE policy preset
#
# Full capability: inference + all gateways + web search + skills download.
# Hermes can:
#   - Call the local LLM via inference.local
#   - Post/receive Telegram, Discord, Slack messages
#   - Run web_search and web_extract tools (DuckDuckGo)
#   - Download skills from GitHub
#   - Use MCP servers on localhost
#
# Still blocked:
#   - Arbitrary outbound connections (only approved hosts)
#   - Filesystem outside ~/.hermes and /sandbox
#   - Privileged syscalls
#
# Use when: you want the full Hermes toolset with sandbox safety net.
#
# Apply: openshell policy set hermesclaw-1 --policy openshell/policy-permissive.yaml --wait

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /root/.hermes
    - /sandbox
    - /tmp

landlock:
  enabled: true

process:
  user: hermes
  group: hermes

network_policies:
  inference_local:
    binaries:
      - "/root/.local/bin/hermes*"
      - "/usr/bin/python3*"
    endpoints:
      - host: "inference.local"
        port: 443
        protocol: https
        tls: required
      - host: "inference.local"
        port: 80
        protocol: http

  telegram_gateway:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "api.telegram.org"
        port: 443
        protocol: https
        tls: required

  discord_gateway:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "discord.com"
        port: 443
        protocol: https
        tls: required
      - host: "gateway.discord.gg"
        port: 443
        protocol: https
        tls: required

  slack_gateway:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "slack.com"
        port: 443
        protocol: https
        tls: required
      - host: "wss-primary.slack.com"
        port: 443
        protocol: https
        tls: required

  web_search:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "html.duckduckgo.com"
        port: 443
        protocol: https
        tls: required
        rest:
          - method: "GET"
            path: "/*"
            access_level: read-only
      - host: "api.duckduckgo.com"
        port: 443
        protocol: https
        tls: required
        rest:
          - method: "GET"
            path: "/*"
            access_level: read-only

  github_skills:
    binaries:
      - "/root/.local/bin/hermes*"
    endpoints:
      - host: "github.com"
        port: 443
        protocol: https
        tls: required
      - host: "raw.githubusercontent.com"
        port: 443
        protocol: https
        tls: required
        rest:
          - method: "GET"
            path: "/*"
            access_level: read-only
      - host: "api.github.com"
        port: 443
        protocol: https
        tls: required
        rest:
          - method: "GET"
            path: "/*"
            access_level: read-only
